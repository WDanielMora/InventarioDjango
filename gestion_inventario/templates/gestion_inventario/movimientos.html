{% extends 'gestion_inventario/base.html' %}

{% block title %}Registrar Movimiento - Sistema de Inventario{% endblock %}

{% block content %}
<style>
  :root {
    --color-primary: #1E3C72;
    --color-secondary: #2A5298;
    --color-light: #ecf0f1;
    --color-dark: #2c3e50;
    --color-success: #27ae60;
    --color-danger: #e74c3c;
  }

  body {
    font-family: 'Poppins', sans-serif;
  }

  h1.h2 {
    background: linear-gradient(45deg, var(--color-primary), var(--color-secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
  }

  .btn-secondary {
    background-color: var(--color-dark);
    border: none;
    font-weight: 600;
    color: #fff;
    transition: transform 0.2s ease, background 0.3s ease;
  }
  .btn-secondary:hover {
    transform: scale(1.03);
    background-color: var(--color-secondary);
  }

  .card {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(6px);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  }

  .form-control:focus, .form-select:focus {
    border-color: var(--color-secondary);
    box-shadow: none;
  }

  .btn-success {
    background: linear-gradient(45deg, var(--color-primary), var(--color-secondary));
    border: none;
    font-weight: 600;
    transition: transform 0.2s ease, background 0.3s ease;
  }
  .btn-success:hover {
    transform: scale(1.03);
    background: linear-gradient(45deg, var(--color-secondary), var(--color-primary));
  }
</style>

<div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
  <h1 class="h2">Registrar Movimiento</h1>
  <a href="{% url 'gestion_inventario:dashboard' %}" class="btn btn-secondary">
    <i class="bi bi-arrow-left"></i> Volver al Dashboard
  </a>
</div>

<div class="card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}

      <!-- Producto -->
      <div class="mb-3">
        <label for="producto" class="form-label">Producto</label>
        <select class="form-select" id="producto" name="producto" required>
          <option value="">Seleccione un producto</option>
          {% for prod in productos %}
            <option value="{{ prod.id }}">{{ prod.nombre }} (Stock: {{ prod.stock_actual }})</option>
          {% endfor %}
        </select>
      </div>

      <!-- Tipo de movimiento -->
      <div class="mb-3">
        <label for="tipo" class="form-label">Tipo de Movimiento</label>
        <select class="form-select" id="tipo" name="tipo" required>
          <option value="ENTRADA">Entrada</option>
          <option value="SALIDA">Salida</option>
        </select>
      </div>

      <!-- Cliente (solo para salidas) -->
      <div class="mb-3" id="cliente-field">
        <label for="cliente" class="form-label">Cliente</label>
        <select class="form-select" id="cliente" name="cliente">
          <option value="">Seleccione un cliente</option>
          {% for cli in clientes %}
            <option value="{{ cli.id }}">{{ cli.nombre }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Cantidad -->
      <div class="mb-3">
        <label for="cantidad" class="form-label">Cantidad</label>
        <input type="number" class="form-control" id="cantidad" name="cantidad" min="1" required>
      </div>

      <!-- Motivo -->
      <div class="mb-3">
        <label for="motivo" class="form-label">Motivo</label>
        <textarea class="form-control" id="motivo" name="motivo" rows="3" required></textarea>
      </div>

      <button type="submit" class="btn btn-success w-100">
        <i class="bi bi-save"></i> Registrar Movimiento
      </button>
    </form>
  </div>
</div>

<script>
  const tipoSelect = document.getElementById('tipo');
  const clienteField = document.getElementById('cliente-field');

  function toggleClienteField() {
    if (tipoSelect.value === 'SALIDA') {
      clienteField.style.display = 'block';
    } else {
      clienteField.style.display = 'none';
    }
  }

  tipoSelect.addEventListener('change', toggleClienteField);
  window.onload = toggleClienteField;
</script>
{% endblock %}
