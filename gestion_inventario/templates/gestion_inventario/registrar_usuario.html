<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Usuario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1E3C72 0%, #2A5298 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
    }
    .card {
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      background: rgba(255,255,255,0.95);
      animation: fadeIn 1s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .form-control:focus {
      border-color: #2A5298;
      box-shadow: none;
    }
    .btn-register {
      background-color: #1E3C72;
      color: white;
      font-weight: 600;
      border: none;
      transition: background 0.3s ease, transform 0.2s ease;
    }
    .btn-register:hover {
      background-color: #2A5298;
      transform: scale(1.03);
    }
    .spinner-border {
      display: none;
    }
  </style>
</head>
<body>
  <div class="card p-4" style="max-width: 420px; width: 100%;">
    <h3 class="text-center mb-4"><i class="bi bi-person-plus"></i> Crear Cuenta</h3>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    <form method="post" onsubmit="showSpinner()">
      {% csrf_token %}

      <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
        {{ form.username }}
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
        {{ form.email }}
      </div>

      <div class="input-group mb-3 position-relative">
        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
        {{ form.password1 }}
      </div>

      <div class="input-group mb-3 position-relative">
        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
        {{ form.password2 }}
      </div>

      <button type="submit" class="btn btn-register w-100">
        <span>Registrarse</span>
        <div class="spinner-border spinner-border-sm ms-2" role="status" id="spinner"></div>
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="{% url 'gestion_inventario:login' %}" class="text-decoration-none">
        ¿Ya tienes cuenta? <strong>Inicia sesión</strong>
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function showSpinner() {
      document.getElementById("spinner").style.display = "inline-block";
    }
  </script>
</body>
</html>
