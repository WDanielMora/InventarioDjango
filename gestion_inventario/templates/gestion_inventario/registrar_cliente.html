{% extends 'gestion_inventario/base.html' %}

{% block title %}Registrar Cliente - Sistema de Inventario{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-4 border-bottom">
  <h1 class="h2 text-gradient">Registrar Cliente</h1>
  <a href="{% url 'gestion_inventario:lista_clientes' %}" class="btn btn-secondary">
    <i class="bi bi-arrow-left"></i> Volver a Clientes
  </a>
</div>

<div class="card glass-card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" class="form-control" id="nombre" name="nombre" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email">
      </div>
      <div class="mb-3">
        <label for="telefono" class="form-label">Teléfono</label>
        <input type="text" class="form-control" id="telefono" name="telefono">
      </div>
      <div class="mb-3">
        <label for="direccion" class="form-label">Dirección</label>
        <input type="text" class="form-control" id="direccion" name="direccion">
      </div>
      <button type="submit" class="btn btn-gradient w-100">
        <i class="bi bi-save"></i> Guardar Cliente
      </button>
    </form>
  </div>
</div>
{% endblock %}
