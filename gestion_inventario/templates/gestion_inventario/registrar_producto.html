{% extends 'gestion_inventario/base.html' %}

{% block title %}Registrar Producto - Sistema de Inventario{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2 text-gradient">Registrar Producto</h1>
    <a href="{% url 'gestion_inventario:lista_productos' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Volver a Productos
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            
            <!-- Código -->
            <div class="mb-3">
                <label for="codigo" class="form-label">Código</label>
                <input type="text" class="form-control" id="codigo" name="codigo" required>
            </div>

            <!-- Nombre -->
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="nombre" name="nombre" required>
            </div>

            <!-- Proveedor -->
            <div class="mb-3">
                <label for="proveedor" class="form-label">Proveedor</label>
                <select class="form-select" id="proveedor" name="proveedor" required>
                    <option value="">Seleccione un proveedor</option>
                    {% for prov in proveedores %}
                        <option value="{{ prov.id }}">{{ prov.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Precio -->
            <div class="mb-3">
                <label for="precio" class="form-label">Precio</label>
                <input type="number" step="0.01" class="form-control" id="precio" name="precio" required>
            </div>

            <!-- Stock actual -->
            <div class="mb-3">
                <label for="stock_actual" class="form-label">Stock Actual</label>
                <input type="number" class="form-control" id="stock_actual" name="stock_actual" required>
            </div>

            <!-- Stock mínimo -->
            <div class="mb-3">
                <label for="stock_minimo" class="form-label">Stock Mínimo</label>
                <input type="number" class="form-control" id="stock_minimo" name="stock_minimo" value="5">
            </div>

            <!-- Activo -->
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="activo" name="activo" checked>
                <label class="form-check-label" for="activo">
                    Activo
                </label>
            </div>

            <button type="submit" class="btn btn-success w-100">
                <i class="bi bi-save"></i> Guardar Producto
            </button>
        </form>
    </div>
</div>
{% endblock %}
