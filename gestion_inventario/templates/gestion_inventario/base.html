<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sistema de Inventario{% endblock %}</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">

  <style>
    :root {
      --color-primary: #1E3C72;
      --color-secondary: #2A5298;
      --color-dark: #2c3e50;
      --color-light: #ecf0f1;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--color-light);
    }

    /* Sidebar */
    .sidebar {
      background: linear-gradient(180deg, var(--color-primary), var(--color-secondary));
      min-height: 100vh;
      color: #fff;
      position: fixed;
      top: 0;
      left: -250px;
      width: 250px;
      transition: left 0.3s ease;
      z-index: 1000;
      overflow-y: auto;
    }

    .sidebar.active {
      left: 0;
    }

    .sidebar h4 {
      font-weight: 700;
    }

    .sidebar .nav-link {
      color: #fff;
      font-weight: 500;
      border-radius: 6px;
      margin-bottom: 8px;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    .sidebar .nav-link:hover {
      background: rgba(255,255,255,0.2);
      transform: translateX(3px);
    }

    .sidebar .nav-link.active {
      background: rgba(255,255,255,0.3);
      font-weight: 600;
    }

    /* Botón hamburguesa */
    .menu-toggle {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 1001;
  background: rgba(255,255,255,0.8); /* tono neutro translúcido */
  color: var(--color-dark);          /* icono en gris oscuro */
  border: 1px solid rgba(0,0,0,0.1); /* borde sutil */
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  transition: all 0.3s ease;
}

.menu-toggle:hover {
  background: rgba(255,255,255,1);   /* blanco sólido al pasar el mouse */
  transform: scale(1.05);
}
    }

    .menu-toggle.active {
      left: 270px;
    }

    /* Overlay */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      display: none;
    }

    .overlay.active {
      display: block;
    }

    /* Contenido principal */
    main {
      padding: 20px;
      margin-left: 0;
      transition: margin-left 0.3s ease;
    }

    /* Botón cerrar en sidebar */
    .close-sidebar {
      position: absolute;
      top: 15px;
      right: 15px;
      background: transparent;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.3s;
    }

    .close-sidebar:hover {
      opacity: 1;
    }

    @media (max-width: 768px) {
      .menu-toggle {
        top: 10px;
        left: 10px;
      }
    }
  </style>
</head>
<body>

  {% if request.resolver_match.url_name != 'login' %}
  <!-- Botón hamburguesa -->
  <button class="menu-toggle" id="menuToggle">
    <i class="bi bi-list" style="font-size: 24px;"></i>
  </button>

  <!-- Overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <button class="close-sidebar" id="closeSidebar">
      <i class="bi bi-x"></i>
    </button>

    <div class="d-flex flex-column p-3" style="margin-top: 40px;">
      <h4 class="text-center mb-4">
        <i class="bi bi-box-seam"></i> Inventario
      </h4>
      <ul class="nav nav-pills flex-column">
        <li class="nav-item">
          <a href="{% url 'gestion_inventario:dashboard' %}" 
             class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
            <i class="bi bi-speedometer2"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a href="{% url 'gestion_inventario:lista_clientes' %}" 
             class="nav-link {% if request.resolver_match.url_name == 'lista_clientes' %}active{% endif %}">
            <i class="bi bi-people"></i> Clientes
          </a>
        </li>
        <li class="nav-item">
          <a href="{% url 'gestion_inventario:lista_productos' %}" 
             class="nav-link {% if request.resolver_match.url_name == 'lista_productos' %}active{% endif %}">
            <i class="bi bi-box"></i> Productos
          </a>
        </li>
        <li class="nav-item">
          <a href="{% url 'gestion_inventario:lista_proveedores' %}" 
             class="nav-link {% if request.resolver_match.url_name == 'lista_proveedores' %}active{% endif %}">
            <i class="bi bi-truck"></i> Proveedores
          </a>
        </li>
        <li class="nav-item">
          <a href="{% url 'gestion_inventario:lista_movimientos' %}" 
             class="nav-link {% if request.resolver_match.url_name == 'lista_movimientos' %}active{% endif %}">
            <i class="bi bi-arrow-left-right"></i> Movimientos
          </a>
        </li>
        <li class="nav-item mt-3">
          <a href="{% url 'gestion_inventario:logout' %}" class="nav-link">
            <i class="bi bi-box-arrow-right"></i> Cerrar sesión
          </a>
        </li>
      </ul>
    </div>
  </div>
  {% endif %}

  <!-- Contenido principal -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const closeSidebar = document.getElementById('closeSidebar');

    function toggleSidebar() {
      sidebar.classList.toggle('active');
      overlay.classList.toggle('active');
      menuToggle.classList.toggle('active');
    }

    if (menuToggle) {
      menuToggle.addEventListener('click', toggleSidebar);
    }

    if (overlay) {
      overlay.addEventListener('click', toggleSidebar);
    }

    if (closeSidebar) {
      closeSidebar.addEventListener('click', toggleSidebar);
    }
  </script>

</body>
</html>
