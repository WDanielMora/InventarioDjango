<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema de Inventario</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- CSS embebido -->
  <style>
    /* Fondo general con gradiente y centrado */
    body.login-container {
      background: linear-gradient(135deg, #1E3C72 0%, #2A5298 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }

    /* Tarjeta del login */
    .login-card {
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      background: rgba(255,255,255,0.95);
      padding: 30px;
      width: 100%;
      max-width: 400px;
      animation: fadeIn 1s ease-in;
    }

    /* Animación de entrada */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Inputs */
    .form-control:focus {
      border-color: #2A5298;
      box-shadow: none;
    }

    /* Botón de login */
    .btn-login {
      background-color: #1E3C72;
      color: white;
      font-weight: 600;
      border: none;
      transition: background 0.3s ease, transform 0.2s ease;
    }
    .btn-login:hover {
      background-color: #2A5298;
      transform: scale(1.03);
    }

    /* Spinner oculto por defecto */
    .spinner-border {
      display: none;
    }

    /* Link de recuperar contraseña */
    .forgot-link {
      font-size: 0.9rem;
      color: #2A5298;
      text-decoration: none;
    }
    .forgot-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body class="login-container">

  <div class="login-card">
    <h3 class="text-center mb-4 fw-bold">
      <i class="bi bi-box-seam"></i> Sistema de Inventario
    </h3>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    <form method="post" onsubmit="showSpinner()">
      {% csrf_token %}
      <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
        <input type="text" class="form-control" placeholder="Usuario" name="username" required>
      </div>
      <div class="input-group mb-3 position-relative">
        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
        <input type="password" class="form-control" placeholder="Contraseña" id="password" name="password" required>
        <i class="bi bi-eye toggle-password" onclick="togglePassword()"></i>
      </div>
      <div class="mb-3 text-end">
        <a href="{% url 'password_reset' %}" class="forgot-link">Recuperar Contraseña</a>
      </div>
      <button type="submit" class="btn-login w-100 mb-3">
        <span>Ingresar</span>
        <div class="spinner-border spinner-border-sm ms-2" role="status" id="spinner"></div>
      </button>
    </form>

    <div class="text-center">
      <p class="mt-2">
        ¿No tienes cuenta?
        <a href="{% url 'gestion_inventario:registrar_usuario' %}" class="fw-bold text-primary">
          Regístrate aquí
        </a>
      </p>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function togglePassword() {
      const passwordInput = document.getElementById("password");
      const icon = document.querySelector(".toggle-password");
      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
      } else {
        passwordInput.type = "password";
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
      }
    }

    function showSpinner() {
      document.getElementById("spinner").style.display = "inline-block";
    }
  </script>
</body>
</html>
