{% extends 'gestion_inventario/base.html' %}

{% block title %}Registrar Proveedor - Sistema de Inventario{% endblock %}

{% block content %}
<style>
  :root {
    --color-primary: #1E3C72;
    --color-secondary: #2A5298;
    --color-dark: #2c3e50;
    --color-success: #27ae60;
  }

  body {
    font-family: 'Poppins', sans-serif;
  }

  /* Título con gradiente */
  h1.h2 {
    background: linear-gradient(45deg, var(--color-primary), var(--color-secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
  }

  /* Botón volver */
  .btn-secondary {
    background-color: var(--color-dark);
    border: none;
    font-weight: 600;
    color: #fff;
    transition: transform 0.2s ease, background 0.3s ease;
  }
  .btn-secondary:hover {
    transform: scale(1.03);
    background-color: var(--color-secondary);
  }

  /* Tarjeta con efecto glass */
  .card {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(6px);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  }

  /* Inputs */
  .form-control:focus {
    border-color: var(--color-secondary);
    box-shadow: none;
  }

  /* Botón guardar proveedor */
  .btn-success {
    background: linear-gradient(45deg, var(--color-primary), var(--color-secondary));
    border: none;
    font-weight: 600;
    transition: transform 0.2s ease, background 0.3s ease;
  }
  .btn-success:hover {
    transform: scale(1.03);
    background: linear-gradient(45deg, var(--color-secondary), var(--color-primary));
  }
</style>

<div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
  <h1 class="h2">Registrar Proveedor</h1>
  <a href="{% url 'gestion_inventario:lista_proveedores' %}" class="btn btn-secondary">
    <i class="bi bi-arrow-left"></i> Volver a Proveedores
  </a>
</div>

<div class="card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" class="form-control" id="nombre" name="nombre" required>
      </div>
      <div class="mb-3">
        <label for="contacto" class="form-label">Contacto</label>
        <input type="text" class="form-control" id="contacto" name="contacto">
      </div>
      <div class="mb-3">
        <label for="telefono" class="form-label">Teléfono</label>
        <input type="text" class="form-control" id="telefono" name="telefono">
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email">
      </div>
      <button type="submit" class="btn btn-success w-100">
        <i class="bi bi-save"></i> Guardar Proveedor
      </button>
    </form>
  </div>
</div>
{% endblock %}
